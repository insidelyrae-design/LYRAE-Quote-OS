function genKeyword(style, quote) {
const pool = STYLE_PROFILES[style]?.keywords || STYLE_PROFILES.Soft.keywords;
return pool[(quote?.length || 7) % pool.length];
}

function buildPrompt({ quote, style, postType, mood, scene, keyword, cta, ratio }) {
const sp = STYLE_PROFILES[style] || STYLE_PROFILES.Soft;
const pp = POST_TYPE_PROFILES[postType] || POST_TYPE_PROFILES.Portrait;
const mp = MOOD_PROFILES[mood] || MOOD_PROFILES.Calm;
const kw = keyword?.trim()? keyword.trim().toUpperCase() : genKeyword(style, quote);
const qLen = quote?.trim().length || 0;
const layoutNote = qLen < 40? "treated as a cover statement, large and typographically dominant" : "typographically refined for readability, clean hierarchical layout";
const qBlock = quote?.trim()? `"${quote.trim()}"` : '"[your quote]"';
const ratioNote = ratio === "9:16"
? "vertical 9:16 aspect ratio for Instagram Reels and Stories, full-height portrait canvas 1080×1920px, subject fills the vertical frame, typography flows top-to-bottom with generous vertical breathing room"
: "vertical 4:5 aspect ratio for Instagram Feed Posts, portrait canvas 1080×1350px, subject centred with balanced margins, typography anchored in the upper or lower third";
let p = `${qBlock}, ultra-realistic high-fashion editorial image of a feminine woman with clearly visible face and strong direct eye contact, ${ratioNote}, ${pp}, ${sp.lighting}, ${sp.palette} color palette, ${sp.styling}, set in a ${sp.environment}`;
if (scene?.trim()) p += ` — specifically: ${scene.trim()}`;
p += `, ${sp.energy} emotional atmosphere, ${mp}, oversized editorial keyword "${kw}" displayed with intentional typographic presence using ${sp.typographyStyle}, quote text ${layoutNote} — displayed exactly as written, never repeated, never cluttered, premium magazine layout integration, ${sp.contrast}, strong deliberate negative space, emotionally sharp scroll-stopping composition, luminous realistic skin texture, premium fashion photography, 8K editorial resolution`;
if (cta?.trim()) p += `, closing bridge line at the bottom: "${cta.trim()}"`;
return { prompt: p, autoKeyword: kw };
}

function buildHierarchy(postType, style, ratio) {
const h = {
Portrait:"— Headline: centered or upper third, largest weight\n— Quote: mid-frame, clean serif, breathing room above and below\n— Keyword: vertical along edge, faded and oversized\n— Closing line: bottom, smallest, soft weight",
Collage:"— Lead image: dominant top-left, largest element\n— Quote: upper right or centered overlay, readable white space\n— Support elements: 3 maximum, balanced grid spacing\n— Keyword: behind the lead image, scaled up and faded",
Lifestyle:"— Scene: full bleed, aspirational and detailed\n— Quote: floated in the upper or lower third, white space protected\n— Keyword: large and faded in the background plane\n— CTA: bottom edge, small and clean",
Cover:"— Masthead-style headline: top, full width, largest type\n— Subject image: centered, full presence, face prominent\n— Quote: below the fold or over lower body, clean hierarchy\n— Keyword: background plane, massive scale, 30% opacity",
};
const sNote = { Soft:"— Typography feels: warm, flowing, intimate", Bridge:"— Typography feels: considered, forward-moving, intentional", Baddie:"— Typography feels: bold, high-contrast, magnetic", Ruthless:"— Typography feels: cold, stark, commanding" };
const rNote = ratio === "9:16"? "— Canvas: 9:16 · 1080×1920px · Reels & Stories — tall vertical stacking, text anchored top or bottom 20%" : "— Canvas: 4:5 · 1080×1350px · Feed Post — balanced portrait framing, text in top or lower third";
return `${h[postType]||h.Portrait}\n${sNote[style]||""}\n${rNote}`;
}

function buildCaption(style, quote) {
const sp = STYLE_PROFILES[style]||STYLE_PROFILES.Soft;
const o = sp.captionOpeners[Math.floor(Math.random()*sp.captionOpeners.length)];
return `${o}${quote?.trim()?'\n\n"'+quote.trim()+'"':''}\n\nSave this if it found you.`;
}

function buildAngle(style, postType) {
const pool = STYLE_PROFILES[style]?.angles||STYLE_PROFILES.Soft.angles;
const i = {Portrait:0,Collage:1,Lifestyle:2,Cover:3}[postType]||0;
return pool[i%pool.length];
}

const inputStyle = {

function Input({ value, onChange, placeholder }) {
const [focus, setFocus] = useState(false);
return <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)}
style={{...inputStyle, background: focus? C.white : C.cream, boxShadow: focus? `0 0 0 3px rgba(201,168,130,0.18)` : "none", border:`1px solid ${focus? C.champagne : "rgba(201,168,130,0.3)"}` }} />;
}

function Textarea({ value, onChange, placeholder, rows=3 }) {
const [focus, setFocus] = useState(false);
return <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)}
style={{...inputStyle, resize:"vertical", lineHeight:1.6, background: focus? C.white : C.cream, boxShadow: focus? `0 0 0 3px rgba(201,168,130,0.18)` : "none", border:`1px solid ${focus? C.champagne : "rgba(201,168,130,0.3)"}` }} />;
}

function Select({ value, onChange, options }) {
return (
<select value={value} onChange={e=>onChange(e.target.value)}

function CopyBtn({ text }) {
const [copied, setCopied] = useState(false);
const copy = () => {

};
return (
<button onClick={copy} style={{ background: copied? C.blush : "none", border:`1px solid ${copied? C.champDark : "rgba(201,168,130,0.3)"}`, borderRadius:6, padding:"3px 11px", fontSize:"0.66rem", letterSpacing:"0.1em", textTransform:"uppercase", color: copied? C.warmBrown : C.inkMuted, cursor:"pointer", transition:"all 0.2s", fontFamily:"inherit" }}>

const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(""),2400); };

const saveBrand = () => {
  localStorage.setItem('brandName', brandName);
  localStorage.setItem('signature', signature);
  showToast(`${brandName} Quote OS installed ✦`);
};

const generateQuotesOnly = useCallback(() => {
  setGenerating(true);
  setTimeout(() => {
    const quotes = QUOTE_BANKS[niche] || QUOTE_BANKS.business;
    const selected = [...quotes].sort(() => 0.5 - Math.random()).slice(0, quoteCount);

    const VIBE_MODS = {
      Soft: q => q.replace(/\.$/, ', softly.'),
      Bridge: q => `Becoming: ${q}`,
      Baddie: q => q.toUpperCase(),
      Ruthless: q => `${q} Period.`
    };

    const modified = selected.map(q => VIBE_MODS[style]? VIBE_MODS[style](q) : q);

    const output = `${brandName} | Vibe: ${style}\n\n${modified.map((q, i) => `${i + 1}. ${q}`).join('\n\n')}\n\n${signature}`;

    setOutputs({ quotes: output });
    setGenerating(false);
    showToast("Quotes generated ✦");
  }, 600);
}, [brandName, signature, niche, quoteCount, style]);

const generatePrompt = useCallback(() => {
  setGenerating(true);
  setTimeout(() => {
    const { prompt, autoKeyword } = buildPrompt({ quote, style, postType, mood, scene, keyword, cta, ratio });
    setOutputs(prev => ({
     ...prev,
      prompt,
      keyword: autoKeyword,
      caption: buildCaption(style, quote),
      angle: buildAngle(style, postType),
      hierarchy: buildHierarchy(postType, style, ratio),

  const p = PRESETS[id];

  setStyle(p.style); setPostType(p.postType); setMood(p.mood);

  setActivePreset(id); setPresetGuidance(p);

};

      showToast(`Switched to ${v} ✦`);

  }
};
